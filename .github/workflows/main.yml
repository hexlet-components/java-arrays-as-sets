name: JavaCI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up OpenJDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          cache: 'gradle'
          distribution: 'temurin'
      - run: make build
      - run: make lint
      - run: make test
